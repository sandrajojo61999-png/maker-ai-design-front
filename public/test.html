<!DOCTYPE html>
<html>
<head><title>MAKER AI - OCC Test</title></head>
<body style="margin:0;background:#111;color:white;font-family:monospace">
<div id="status" style="position:fixed;top:10px;left:10px;z-index:1">Loading OCC...</div>
<canvas id="c"></canvas>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js",
    "three/examples/jsm/loaders/STLLoader.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/STLLoader.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js'
import { STLLoader } from 'three/examples/jsm/loaders/STLLoader.js'

const canvas = document.getElementById('c')
canvas.width = window.innerWidth
canvas.height = window.innerHeight

const renderer = new THREE.WebGLRenderer({canvas, antialias:true})
renderer.setSize(window.innerWidth, window.innerHeight)

const scene = new THREE.Scene()
scene.background = new THREE.Color(0x222222)

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000)
camera.position.set(0, 0, 150)

const controls = new OrbitControls(camera, canvas)
controls.target.set(21, 21, 21)
camera.lookAt(21, 21, 21)

scene.add(new THREE.AmbientLight(0xffffff, 0.6))
const d = new THREE.DirectionalLight(0xffffff, 0.8)
d.position.set(50, 100, 50)
scene.add(d)

function animate() {
  requestAnimationFrame(animate)
  controls.update()
  renderer.render(scene, camera)
}
animate()

const workerCode = `
import opencascadeInit from '/src/occ/opencascade.wasm.js';

async function init() {
  self.postMessage({ status: "loading" });
  try {
    const oc = await opencascadeInit({
      locateFile: () => '/src/occ/opencascade.wasm.wasm'
    });
    self.postMessage({ status: "occ_ready" });
    const box = new oc.BRepPrimAPI_MakeBox_2(new oc.gp_Pnt_3(0,0,0), 42, 42, 42).Shape();
    new oc.BRepMesh_IncrementalMesh_2(box, 0.5, false, 0.5, false);
    oc.FS.createDataFile('/', 'box.stl', [], true, true, true);
    const writer = new oc.StlAPI_Writer();
    writer.Write(box, '/box.stl');
    const stlData = oc.FS.readFile('/box.stl', { encoding: 'binary' });
    self.postMessage({ status: "stl", data: stlData.buffer }, [stlData.buffer]);
  } catch (err) {
    self.postMessage({ status: "error", message: err.message });
  }
}
init();
`

const blob = new Blob([workerCode], {type: 'application/javascript'})
const workerUrl = URL.createObjectURL(blob)
const worker = new Worker(workerUrl, {type: 'module'})

worker.onmessage = (e) => {
  document.getElementById('status').textContent = 'Status: ' + e.data.status
  if (e.data.status === 'stl') {
    const loader = new STLLoader()
    const geometry = loader.parse(e.data.data)
    geometry.computeVertexNormals()
    const mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({color: 0x4caf50}))
    scene.add(mesh)
  }
  if (e.data.status === 'error') {
    document.getElementById('status').textContent = 'ERROR: ' + e.data.message
  }
}
worker.onerror = (e) => document.getElementById('status').textContent = 'Worker error: ' + e.message
</script>
</body>
</html>
